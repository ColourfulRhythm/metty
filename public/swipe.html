<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Delicious</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blush:#f5e8e4;--blush-mid:#eeddd8;--blush-deep:#e8cfc8;
  --rose:#c97b6e;--rose-dark:#b3604f;--rose-light:#e8a99f;
  --cream:#faf5f3;--text-dark:#2d1f1c;--text-mid:#7a5c57;--text-light:#b89a95;
  --white:#ffffff;--green:#4caf82;
  --pad:40px;--gutter:max(var(--pad),env(safe-area-inset-left));--gutter-r:max(var(--pad),env(safe-area-inset-right));--pad-top:max(var(--pad),env(safe-area-inset-top));--pad-bottom:max(var(--pad),env(safe-area-inset-bottom));
  --card-w:min(340px,100%);--card-h:min(480px,70vh)
}
html{overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#f0e4e0;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;position:relative;padding:var(--pad-top) var(--gutter) var(--pad-bottom) var(--gutter-r);width:100%;max-width:100vw}
.page-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 80% 0%,#f5ddd8 0%,transparent 60%),radial-gradient(ellipse at 10% 90%,#f0d8d2 0%,transparent 50%),var(--cream)}

.name-entry{position:fixed;inset:0;z-index:200;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:var(--pad-top) var(--gutter) var(--pad-bottom) var(--gutter-r);text-align:center}
.name-entry.hidden{display:none}
.name-entry .name-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:42px;color:var(--rose)}
.name-entry .sub{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase}
.name-entry input{width:100%;max-width:min(300px,calc(100vw - var(--gutter) - var(--gutter-r)));padding:15px 20px;border-radius:16px;border:1.5px solid transparent;background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);outline:none;text-align:center;box-shadow:0 1px 4px rgba(180,100,80,0.06)}
.name-entry input:focus{border-color:var(--rose-light);box-shadow:0 0 0 4px rgba(201,123,110,0.08)}
.name-entry input::placeholder{color:var(--text-light)}
.name-entry button{padding:17px 40px;border-radius:20px;background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);border:none;color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;box-shadow:0 4px 20px rgba(179,96,79,0.35);transition:all 0.25s}
.name-entry button:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(179,96,79,0.4)}
.name-entry button:disabled{opacity:.5;cursor:not-allowed;transform:none}

header{position:relative;z-index:2;padding:0 0 20px;text-align:center;width:100%}
.swipe-sub{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase;margin-bottom:2px}
.swipe-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:38px;color:var(--rose)}

.swipe-area{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;width:100%;padding:16px 0 24px}
.stack{position:relative;width:var(--card-w);min-width:0;height:var(--card-h);margin-bottom:24px}
.card{position:absolute;inset:0;border-radius:28px;overflow:hidden;cursor:grab;user-select:none;touch-action:none;box-shadow:0 8px 32px rgba(0,0,0,0.12);will-change:transform}
.card:active{cursor:grabbing}
.card img{width:100%;height:100%;object-fit:cover;pointer-events:none;display:block}
.card:nth-child(2){transform:rotate(-2.5deg) translateY(8px) scale(0.97);z-index:1;filter:brightness(0.95)}
.card:nth-child(3){transform:rotate(2deg) translateY(12px) scale(0.94);z-index:0;filter:brightness(0.9)}
.card:nth-child(n+4){transform:scale(0.91) translateY(18px);z-index:-1;opacity:0}
.card.top{z-index:10;transform:none!important;filter:none}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(45,31,28,0.4) 0%,transparent 50%);pointer-events:none}
.card-num{position:absolute;bottom:16px;right:20px;font-size:11px;letter-spacing:0.1em;color:white;text-transform:uppercase;font-weight:500}
.stamp{position:absolute;top:24px;padding:6px 14px;border-radius:20px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;letter-spacing:0.1em;opacity:0;transition:opacity .15s;pointer-events:none;backdrop-filter:blur(8px)}
.stamp.love{left:20px;color:#e07a7a;background:rgba(255,255,255,0.9);border:2px solid #e07a7a;transform:rotate(-12deg)}
.stamp.nope{right:20px;color:#b0a0a0;background:rgba(255,255,255,0.9);border:2px solid #b0a0a0;transform:rotate(12deg)}

.swipe-actions{display:flex;gap:20px;align-items:center;margin-bottom:20px}
.action-btn{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.action-btn:hover{transform:scale(1.08)}
.action-pass{background:var(--white)}
.action-love{width:80px;height:80px;font-size:32px;background:linear-gradient(135deg,#e8756a,var(--rose-dark))}

.swipe-progress{width:100%;max-width:var(--card-w)}
.progress-dots{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:var(--blush-deep);transition:background .3s,transform .3s}
.dot.active{background:var(--rose);transform:scale(1.3)}
.dot.done{background:var(--rose-light);opacity:.7}

.done-screen{display:none;position:fixed;inset:0;z-index:100;background:var(--cream);flex-direction:column;overflow-y:auto;padding:var(--pad-top) var(--gutter) var(--pad-bottom) var(--gutter-r)}
.done-screen.show{display:flex}
.done-header{padding:0 0 24px;background:linear-gradient(180deg,#f5e3de 0%,var(--cream) 100%);border-radius:0 0 24px 24px}
.done-screen h2{font-family:'Playfair Display',serif;font-style:italic;font-size:38px;color:var(--rose);line-height:1.1;margin-bottom:6px}
.done-screen .sub{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase;margin-bottom:24px}
.picks-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:min(420px,100%)}
.picks-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:20px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.picks-grid .empty{grid-column:1/-1;text-align:center;padding:40px 0;font-size:14px;color:var(--text-light)}

.chat-fab{position:fixed;bottom:calc(var(--pad-bottom) + 80px);right:var(--gutter-r);width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);color:white;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(179,96,79,0.35);z-index:150;display:none;align-items:center;justify-content:center;transition:transform .2s}
.chat-fab:hover{transform:scale(1.1)}
.chat-fab.active{display:flex}
.chat-panel{display:none;position:fixed;bottom:calc(var(--pad-bottom) + 140px);right:var(--gutter-r);width:min(300px,calc(100vw - var(--gutter) - var(--gutter-r) - 24px));max-height:320px;background:var(--white);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,0.12);z-index:150;flex-direction:column;overflow:hidden}
.chat-panel.open{display:flex}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--blush-deep);font-size:10px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-light)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.4;color:var(--text-dark)}
.chat-msg.from-creator{background:var(--blush);align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.from-viewer{background:var(--rose-light);color:var(--text-dark);align-self:flex-end;border-bottom-right-radius:4px}
.chat-input-row{display:flex;padding:12px 16px;gap:8px;border-top:1px solid var(--blush-deep)}
.chat-input-row input{flex:1;padding:12px 16px;border:none;border-radius:100px;background:rgba(245,232,228,0.5);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);outline:none}
.chat-input-row input:focus{box-shadow:0 0 0 2px var(--rose-light)}
.chat-input-row button{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);border:none;color:white;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div class="page-bg"></div>

<div class="name-entry" id="nameEntry">
  <div class="name-logo">delicious</div>
  <div class="sub" id="sessionLabel">loading...</div>
  <input type="text" id="viewerName" placeholder="Your name">
  <button id="btnJoin">Let&rsquo;s go</button>
</div>

<header>
  <div class="swipe-sub" id="headerSub"></div>
  <div class="swipe-logo">delicious</div>
</header>

<div class="swipe-area">
  <div class="stack" id="stack"></div>
  <div class="swipe-actions" id="actions" style="display:none">
    <button class="action-btn action-pass" onclick="doSwipe('left')">✕</button>
    <button class="action-btn action-love" onclick="doSwipe('right')">❤</button>
  </div>
  <div class="swipe-progress">
    <div class="progress-dots" id="dots"></div>
  </div>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-header">
    <h2>your picks</h2>
    <div class="sub">Your taste is immaculate</div>
  </div>
  <div class="picks-grid" id="picksGrid"></div>
</div>

<button class="chat-fab" id="chatFab">💬</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">Chat with creator</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="Say something...">
    <button id="chatSend">&#10148;</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
const sessionId = location.pathname.split('/s/')[1];
let photos = [];
let viewerId = null;
let viewerNameStr = '';
let current = 0;
let isDragging = false, startX = 0, startY = 0, currentX = 0;
let topCard = null;
let picks = [];

async function loadSession() {
  const { data: session, error } = await db.from('sessions').select('*').eq('id', sessionId).single();
  if (error || !session) { document.getElementById('sessionLabel').textContent = 'Session not found'; return; }

  const { data: photoData } = await db.from('session_photos').select('*').eq('session_id', sessionId).order('photo_index');
  photos = photoData || [];
  document.getElementById('sessionLabel').textContent = session.name;
}

document.getElementById('btnJoin').addEventListener('click', async () => {
  const name = document.getElementById('viewerName').value.trim();
  if (!name) { document.getElementById('viewerName').focus(); return; }
  const btn = document.getElementById('btnJoin');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  viewerId = generateId(8);
  viewerNameStr = name;

  const { error } = await db.from('viewers').insert({ id: viewerId, session_id: sessionId, name });
  if (error) { console.error(error); alert('Could not join'); btn.disabled = false; btn.textContent = "Let's go"; return; }

  document.getElementById('nameEntry').classList.add('hidden');
  document.getElementById('headerSub').textContent = document.getElementById('sessionLabel').textContent;
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('chatFab').classList.add('active');
  buildStack();
  subscribeToChatMessages();
});

function buildStack() {
  const stack = document.getElementById('stack');
  const dotsEl = document.getElementById('dots');
  stack.innerHTML = '';
  dotsEl.innerHTML = '';
  const total = photos.length;

  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card' + (i === 0 ? ' top' : '');
    card.dataset.index = i;
    const label = String(i + 1).padStart(2, '0');
    card.innerHTML = `
      <img src="${p.url}" alt="photo ${label}" draggable="false">
      <div class="card-overlay"></div>
      <div class="card-num">${label} / ${String(total).padStart(2, '0')}</div>
      <span class="stamp love">Love</span>
      <span class="stamp nope">Next</span>
    `;
    stack.appendChild(card);

    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });
  attachDrag();
}

function attachDrag() {
  topCard = document.querySelector('.card.top');
  if (!topCard) return;
  topCard.addEventListener('mousedown', onStart);
  topCard.addEventListener('touchstart', onStart, { passive: true });
}

function onStart(e) {
  isDragging = true;
  const pt = e.touches ? e.touches[0] : e;
  startX = pt.clientX; startY = pt.clientY;
  topCard.style.transition = 'none';
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onEnd);
}

function onMove(e) {
  if (!isDragging) return;
  if (e.cancelable) e.preventDefault();
  const pt = e.touches ? e.touches[0] : e;
  currentX = pt.clientX - startX;
  const currentY = pt.clientY - startY;
  topCard.style.transform = `translate(${currentX}px,${currentY * .3}px) rotate(${currentX * .06}deg)`;
  const ratio = Math.min(Math.abs(currentX) / 80, 1);
  topCard.querySelector('.stamp.love').style.opacity = currentX > 0 ? ratio : 0;
  topCard.querySelector('.stamp.nope').style.opacity = currentX < 0 ? ratio : 0;
}

function onEnd() {
  if (!isDragging) return;
  isDragging = false;
  window.removeEventListener('mousemove', onMove);
  window.removeEventListener('mouseup', onEnd);
  window.removeEventListener('touchmove', onMove);
  window.removeEventListener('touchend', onEnd);
  if (Math.abs(currentX) > 90) {
    flyOut(currentX > 0 ? 'right' : 'left');
  } else {
    topCard.style.transition = 'transform .4s cubic-bezier(.175,.885,.32,1.275)';
    topCard.style.transform = '';
    topCard.querySelector('.stamp.love').style.opacity = 0;
    topCard.querySelector('.stamp.nope').style.opacity = 0;
  }
  currentX = 0;
}

function flyOut(dir) {
  const liked = dir === 'right';
  const photoIndex = current;
  if (liked) picks.push(photoIndex);

  db.from('swipes').insert({
    viewer_id: viewerId, session_id: sessionId, photo_index: photoIndex, liked
  }).then();

  const xOut = liked ? 800 : -800;
  topCard.style.transition = 'transform .4s ease, opacity .4s ease';
  topCard.style.transform = `translate(${xOut}px,-60px) rotate(${liked ? 30 : -30}deg)`;
  topCard.style.opacity = '0';

  setTimeout(() => {
    topCard.remove();
    current++;
    updateDots();
    if (current >= photos.length) {
      showDone();
    } else {
      const newTop = document.querySelector('.card');
      if (newTop) {
        newTop.style.transition = 'transform .35s ease';
        newTop.classList.add('top');
        setTimeout(() => newTop.style.transition = '', 350);
      }
      attachDrag();
    }
  }, 380);
}

function doSwipe(dir) { if (topCard) flyOut(dir); }

function updateDots() {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
    if (i < current) d.classList.add('done');
  });
}

function showDone() {
  document.getElementById('actions').style.display = 'none';
  const doneScreen = document.getElementById('doneScreen');
  doneScreen.classList.add('show');
  const grid = document.getElementById('picksGrid');
  grid.innerHTML = '';
  if (picks.length === 0) {
    grid.innerHTML = '<div class="empty">You didn&rsquo;t pick any — that&rsquo;s okay too</div>';
  } else {
    picks.forEach(idx => {
      const img = document.createElement('img');
      img.src = photos[idx].url;
      grid.appendChild(img);
    });
  }
}

const chatFab = document.getElementById('chatFab');
const chatPanel = document.getElementById('chatPanel');
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const chatSend = document.getElementById('chatSend');

chatFab.addEventListener('click', () => chatPanel.classList.toggle('open'));
chatSend.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text || !viewerId) return;
  chatInput.value = '';
  appendChatMsg('viewer', text);
  await db.from('chat_messages').insert({
    session_id: sessionId, viewer_id: viewerId, sender: 'viewer', text
  });
}

function appendChatMsg(sender, text) {
  const div = document.createElement('div');
  div.className = `chat-msg ${sender === 'viewer' ? 'from-viewer' : 'from-creator'}`;
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function subscribeToChatMessages() {
  db.channel('chat-' + viewerId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'chat_messages',
      filter: `viewer_id=eq.${viewerId}`
    }, (payload) => {
      const msg = payload.new;
      if (msg.sender === 'creator') appendChatMsg('creator', msg.text);
    })
    .subscribe();
}

loadSession();
</script>
</body>
</html>
