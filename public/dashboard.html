<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Delicious — Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blush:#f5e8e4;--blush-mid:#eeddd8;--blush-deep:#e8cfc8;
  --rose:#c97b6e;--rose-dark:#b3604f;--rose-light:#e8a99f;
  --cream:#faf5f3;--text-dark:#2d1f1c;--text-mid:#7a5c57;--text-light:#b89a95;
  --white:#ffffff;--green:#4caf82;
  --pad:40px;--gutter:max(var(--pad),env(safe-area-inset-left));--gutter-r:max(var(--pad),env(safe-area-inset-right));--pad-top:max(var(--pad),env(safe-area-inset-top));--pad-bottom:max(var(--pad),env(safe-area-inset-bottom))
}
html{overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:#f0e4e0;min-height:100dvh;padding:var(--pad-top) var(--gutter) var(--pad-bottom) var(--gutter-r);position:relative;width:100%;max-width:min(540px,100vw);margin:0 auto;box-sizing:border-box}
.page-box{background:rgba(255,255,255,0.5);border-radius:28px;padding:28px 24px 32px;margin:0 auto;max-width:100%;box-shadow:0 4px 24px rgba(180,100,80,0.08)}
.page-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 0%,#f0d8d2 0%,transparent 60%),var(--cream)}

header{position:relative;z-index:2;text-align:center;padding:0 0 24px;background:linear-gradient(180deg,#f0d8d2 0%,var(--cream) 100%);border-radius:0 0 24px 24px}
.s3-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:36px;color:var(--rose);margin-bottom:2px}
.s3-name{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase;margin-bottom:20px}

.share-row{position:relative;z-index:2;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.btn-share{padding:11px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;border:none}
.btn-outline{background:var(--white);color:var(--text-dark);box-shadow:0 2px 12px rgba(0,0,0,0.06),inset 0 0 0 1.5px var(--blush-deep)}
.btn-outline:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1),inset 0 0 0 1.5px var(--rose-light)}
.btn-whatsapp{background:#25D366;color:white;box-shadow:0 4px 16px rgba(37,211,102,0.3)}

.pill-divider{width:36px;height:4px;background:var(--blush-deep);border-radius:2px;margin:0 auto 28px}

.section-label{position:relative;z-index:2;font-size:10px;font-weight:500;letter-spacing:0.2em;color:var(--text-light);text-transform:uppercase;margin-bottom:14px}

.loved-grid{position:relative;z-index:2;display:flex;gap:12px;overflow-x:auto;padding:0 4px 12px;margin-bottom:28px;-webkit-overflow-scrolling:touch}
.loved-grid::-webkit-scrollbar{display:none}
.loved-card{flex:0 0 auto;width:140px;border-radius:20px;overflow:hidden;position:relative;aspect-ratio:1;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.loved-card img{width:100%;height:100%;object-fit:cover}
.loved-footer{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(to top,rgba(45,31,28,0.5),transparent);display:flex;align-items:center;gap:4px}
.heart-icon{font-size:13px}
.heart-count{font-size:12px;font-weight:500;color:white}

.viewers-list{position:relative;z-index:2;display:flex;flex-direction:column;gap:16px}
.friend-card{background:var(--white);border-radius:24px;padding:18px;box-shadow:0 2px 16px rgba(180,100,80,0.07);animation:fadeIn .4s ease}
.friend-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.friend-name{font-size:16px;font-weight:500;color:var(--text-dark)}
.friend-meta{font-size:11px;color:var(--text-light)}
.friend-thumbs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.friend-thumbs::-webkit-scrollbar{display:none}
.friend-thumb{width:70px;height:70px;border-radius:14px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.friend-thumb img{width:100%;height:100%;object-fit:cover}
.friend-thumbs .no-picks{font-size:12px;color:var(--text-light);font-style:italic;min-width:80px}
.btn-chat{padding:10px 20px;border-radius:100px;border:1.5px solid var(--blush-deep);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.06em;color:var(--text-dark);cursor:pointer;transition:all 0.2s;margin-top:10px}
.btn-chat:hover{background:var(--blush);border-color:var(--rose-light)}

.chat-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(250,245,243,.97);backdrop-filter:blur(8px);flex-direction:column;padding:0}
.chat-modal.open{display:flex}
.chat-modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px var(--gutter-r) 20px var(--gutter);border-bottom:1px solid var(--blush-deep)}
.chat-modal-header .name{font-size:16px;font-weight:500;color:var(--text-dark)}
.chat-modal-header button{background:none;border:none;font-size:24px;color:var(--text-mid);cursor:pointer}
.chat-modal-messages{flex:1;overflow-y:auto;padding:16px var(--gutter-r) 16px var(--gutter);display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:16px;font-size:13px;line-height:1.4;color:var(--text-dark)}
.chat-msg.from-creator{background:var(--blush);align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg.from-viewer{background:var(--rose-light);align-self:flex-start;border-bottom-left-radius:4px}
.chat-input-row{display:flex;padding:12px var(--gutter-r) calc(var(--pad-bottom) + 12px) var(--gutter);gap:8px;border-top:1px solid var(--blush-deep);background:white}
.chat-input-row input{flex:1;padding:12px 16px;border:none;border-radius:100px;background:rgba(245,232,228,0.5);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);outline:none}
.chat-input-row input:focus{box-shadow:0 0 0 2px var(--rose-light)}
.chat-input-row button{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);border:none;color:white;font-size:18px;cursor:pointer}

.empty-state{position:relative;z-index:2;text-align:center;padding:48px 20px;color:var(--text-light);font-size:14px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="page-bg"></div>

<main class="page-box">
<header>
  <div class="s3-logo">delicious</div>
  <div class="s3-name" id="sessionName">loading...</div>
  <div class="share-row">
    <button class="btn-share btn-outline" id="btnCopy">Copy link</button>
    <button class="btn-share btn-whatsapp" id="btnWa">WhatsApp</button>
  </div>
</header>

<div class="pill-divider"></div>

<div class="section-label">Most Loved</div>
<div class="loved-grid" id="leaderboard">
  <div class="empty-state" style="width:100%;flex:1 1 100%">Waiting for picks...</div>
</div>

<div class="section-label">Friends Swiping</div>
<div class="viewers-list" id="viewersList">
  <div class="empty-state">Share the link — waiting for friends to join...</div>
</div>
</main>

<div class="chat-modal" id="chatModal">
  <div class="chat-modal-header">
    <span class="name" id="chatViewerName"></span>
    <button id="chatClose">&times;</button>
  </div>
  <div class="chat-modal-messages" id="chatModalMessages"></div>
  <div class="chat-input-row">
    <input type="text" id="chatModalInput" placeholder="Type a message...">
    <button id="chatModalSend">&#10148;</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
const sessionId = location.pathname.split('/dashboard/')[1];
const creatorToken = localStorage.getItem(`delicious-${sessionId}`);
let session = null;
let photos = [];
let viewers = [];
let swipesMap = {};
let activeViewerId = null;

async function loadDashboard() {
  if (!creatorToken) {
    document.getElementById('viewersList').innerHTML = '<div class="empty-state">No creator token found — open dashboard from the session you created</div>';
    return;
  }

  const { data: sess, error } = await db.from('sessions').select('*').eq('id', sessionId).single();
  if (error || !sess) {
    document.getElementById('viewersList').innerHTML = '<div class="empty-state">Session not found</div>';
    return;
  }
  if (sess.creator_token !== creatorToken) {
    document.getElementById('viewersList').innerHTML = '<div class="empty-state">Unauthorized — wrong creator token</div>';
    return;
  }
  session = sess;
  document.getElementById('sessionName').textContent = session.name;

  const { data: photoData } = await db.from('session_photos').select('*').eq('session_id', sessionId).order('photo_index');
  photos = photoData || [];

  const { data: viewerData } = await db.from('viewers').select('*').eq('session_id', sessionId).order('joined_at');
  viewers = viewerData || [];

  const { data: swipeData } = await db.from('swipes').select('*').eq('session_id', sessionId);
  (swipeData || []).forEach(s => {
    if (!swipesMap[s.viewer_id]) swipesMap[s.viewer_id] = [];
    swipesMap[s.viewer_id].push(s);
  });

  setupShare();
  renderAll();
  subscribeToRealtime();
}

function setupShare() {
  const shareUrl = `${location.origin}/s/${sessionId}`;
  document.getElementById('btnCopy').onclick = () => {
    navigator.clipboard.writeText(shareUrl).then(() => {
      document.getElementById('btnCopy').textContent = 'Copied!';
      setTimeout(() => document.getElementById('btnCopy').textContent = 'Copy link', 2000);
    });
  };
  document.getElementById('btnWa').onclick = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent('pick your faves from my shoot \u{1F497} ' + shareUrl)}`, '_blank');
  };
}

function renderAll() {
  renderLeaderboard();
  renderViewers();
}

function renderLeaderboard() {
  const counts = {};
  photos.forEach((_, i) => counts[i] = 0);
  Object.values(swipesMap).forEach(arr => arr.filter(s => s.liked).forEach(s => counts[s.photo_index] = (counts[s.photo_index] || 0) + 1));

  const sorted = Object.entries(counts).map(([idx, count]) => ({ idx: parseInt(idx), count })).filter(x => x.count > 0).sort((a, b) => b.count - a.count);
  const el = document.getElementById('leaderboard');

  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty-state" style="width:100%;flex:1 1 100%">Waiting for picks...</div>';
    return;
  }
  el.innerHTML = sorted.map(({ idx, count }) => {
    const photo = photos[idx];
    return `<div class="loved-card">
      <img src="${photo?.url}" alt="photo">
      <div class="loved-footer"><span class="heart-icon">❤️</span><span class="heart-count">${count}</span></div>
    </div>`;
  }).join('');
}

function renderViewers() {
  const el = document.getElementById('viewersList');
  if (!viewers.length) {
    el.innerHTML = '<div class="empty-state">Share the link — waiting for friends to join...</div>';
    return;
  }
  el.innerHTML = viewers.map(v => {
    const vSwipes = swipesMap[v.id] || [];
    const vPicks = vSwipes.filter(s => s.liked);
    const picksHtml = vPicks.length > 0
      ? vPicks.map(s => `<div class="friend-thumb"><img src="${photos[s.photo_index]?.url}" alt="pick"></div>`).join('')
      : '<span class="no-picks">Still swiping...</span>';
    return `<div class="friend-card" data-viewer-id="${v.id}">
      <div class="friend-row">
        <span class="friend-name">${escHtml(v.name)}</span>
        <span class="friend-meta">${vSwipes.length}/${photos.length} swiped · ${vPicks.length} picks</span>
      </div>
      <div class="friend-thumbs">${picksHtml}</div>
      <button class="btn-chat" onclick="openChat('${v.id}')">Chat →</button>
    </div>`;
  }).join('');
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function subscribeToRealtime() {
  db.channel('dashboard-' + sessionId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'viewers', filter: `session_id=eq.${sessionId}` }, (payload) => {
      viewers.push(payload.new);
      renderAll();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'swipes', filter: `session_id=eq.${sessionId}` }, (payload) => {
      const s = payload.new;
      if (!swipesMap[s.viewer_id]) swipesMap[s.viewer_id] = [];
      swipesMap[s.viewer_id].push(s);
      renderAll();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `session_id=eq.${sessionId}` }, (payload) => {
      const msg = payload.new;
      if (msg.sender === 'viewer') {
        if (activeViewerId === msg.viewer_id) {
          appendModalMsg('viewer', msg.text);
        } else {
          const card = document.querySelector(`[data-viewer-id="${msg.viewer_id}"]`);
          if (card) {
            const btn = card.querySelector('.btn-chat');
            if (btn) { btn.textContent = 'New message!'; btn.style.background = 'var(--rose)'; btn.style.color = 'white'; btn.style.borderColor = 'var(--rose)'; }
          }
        }
      }
    })
    .subscribe();
}

async function openChat(vId) {
  activeViewerId = vId;
  const viewer = viewers.find(v => v.id === vId);
  if (!viewer) return;
  document.getElementById('chatViewerName').textContent = viewer.name;
  const msgs = document.getElementById('chatModalMessages');
  msgs.innerHTML = '';

  const { data: chatData } = await db.from('chat_messages').select('*').eq('viewer_id', vId).order('created_at');
  (chatData || []).forEach(m => appendModalMsg(m.sender, m.text));

  document.getElementById('chatModal').classList.add('open');
  document.getElementById('chatModalInput').focus();
}

document.getElementById('chatClose').addEventListener('click', () => {
  document.getElementById('chatModal').classList.remove('open');
  activeViewerId = null;
});

document.getElementById('chatModalSend').addEventListener('click', sendModalChat);
document.getElementById('chatModalInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendModalChat(); });

async function sendModalChat() {
  if (!activeViewerId) return;
  const input = document.getElementById('chatModalInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  appendModalMsg('creator', text);
  await db.from('chat_messages').insert({
    session_id: sessionId, viewer_id: activeViewerId, sender: 'creator', text
  });
}

function appendModalMsg(sender, text) {
  const msgs = document.getElementById('chatModalMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${sender === 'creator' ? 'from-creator' : 'from-viewer'}`;
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

loadDashboard();
</script>
</body>
</html>
