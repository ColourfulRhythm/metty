<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Delicious</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💗</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blush:#f5e8e4;--blush-mid:#eeddd8;--blush-deep:#e8cfc8;
  --rose:#c97b6e;--rose-dark:#b3604f;--rose-light:#e8a99f;
  --cream:#faf5f3;--text-dark:#2d1f1c;--text-mid:#7a5c57;--text-light:#b89a95;
  --white:#ffffff;--green:#4caf82;
  --gutter:max(28px,env(safe-area-inset-left));--gutter-r:max(28px,env(safe-area-inset-right))
}
html{overflow-x:hidden}
body{
  font-family:'DM Sans',sans-serif;background:#f0e4e0;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;position:relative;
  padding:calc(env(safe-area-inset-top)+24px) var(--gutter) calc(env(safe-area-inset-bottom)+32px) var(--gutter-r);
  width:100%;max-width:100vw
}
.page-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 80% 0%,#f5ddd8 0%,transparent 60%),
    radial-gradient(ellipse at 10% 90%,#f0d8d2 0%,transparent 50%),var(--cream)
}
header{position:relative;z-index:2;text-align:center;padding:0 0 6px}
.logo{font-family:'Playfair Display',serif;font-style:italic;font-size:46px;font-weight:400;color:var(--rose);line-height:1;letter-spacing:-0.02em}
.tagline{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase;margin-bottom:24px}
.hero-text{font-size:15px;color:var(--text-mid);text-align:center;line-height:1.6;margin-bottom:24px}
.hero-text span{color:var(--rose);font-weight:500}

.upload-area{
  position:relative;z-index:2;width:100%;max-width:min(420px,100%);
  border:1.5px dashed var(--rose-light);border-radius:24px;background:rgba(245,232,228,0.4);
  padding:40px 24px;text-align:center;cursor:pointer;transition:all 0.25s ease;margin-bottom:20px
}
.upload-area:hover,.upload-area.dragover{background:rgba(245,232,228,0.7);border-color:var(--rose)}
.upload-icon{width:52px;height:52px;border-radius:50%;background:var(--white);box-shadow:0 4px 16px rgba(201,123,110,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px}
.upload-area .upload-main{font-size:14px;font-weight:500;color:var(--text-dark);margin-bottom:4px}
.upload-area .upload-sub{font-size:12px;color:var(--text-light)}

.photos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.photos-count{font-size:11px;font-weight:500;letter-spacing:0.1em;color:var(--text-mid);text-transform:uppercase}
.photos-clear{font-size:12px;color:var(--rose);cursor:pointer}
.photos-grid{position:relative;z-index:2;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;width:100%;max-width:min(420px,100%)}
.photo-thumb{width:86px;height:86px;border-radius:16px;overflow:hidden;position:relative;box-shadow:0 2px 12px rgba(0,0,0,0.08);flex-shrink:0}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-remove{position:absolute;top:5px;right:5px;width:20px;height:20px;background:rgba(45,31,28,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:10px;cursor:pointer;backdrop-filter:blur(4px);border:none}

.form-section{position:relative;z-index:2;width:100%;max-width:min(420px,100%);display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.inp{width:100%;padding:15px 20px;border-radius:16px;border:1.5px solid transparent;background:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text-dark);outline:none;transition:all 0.2s;box-shadow:0 1px 4px rgba(180,100,80,0.06)}
.inp::placeholder{color:var(--text-light)}
.inp:focus{border-color:var(--rose-light);box-shadow:0 0 0 4px rgba(201,123,110,0.08)}

.btn-create{
  position:relative;z-index:2;width:100%;max-width:min(420px,100%);padding:17px;
  border-radius:20px;background:linear-gradient(135deg,var(--rose) 0%,var(--rose-dark) 100%);
  border:none;color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.25s ease;
  box-shadow:0 4px 20px rgba(179,96,79,0.35);margin-top:auto
}
.btn-create:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(179,96,79,0.4)}
.btn-create:disabled{opacity:.5;cursor:not-allowed;transform:none}

.progress-bar{display:none;width:100%;max-width:min(420px,100%);height:4px;background:var(--blush-deep);border-radius:2px;margin-top:16px;overflow:hidden;position:relative;z-index:2}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--rose-light),var(--rose));border-radius:2px;transition:width .3s;width:0%}

.share-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(250,245,243,.97);backdrop-filter:blur(12px);flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:48px var(--gutter) 48px var(--gutter-r);text-align:center}
.share-modal.show{display:flex}
.share-modal .s3-logo{font-family:'Playfair Display',serif;font-style:italic;font-size:36px;color:var(--rose);margin-bottom:2px}
.share-modal .share-sub{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--text-light);text-transform:uppercase;margin-bottom:20px}
.share-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.btn-share{padding:11px 22px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;border:none}
.btn-outline{background:var(--white);color:var(--text-dark);box-shadow:0 2px 12px rgba(0,0,0,0.06),inset 0 0 0 1.5px var(--blush-deep)}
.btn-outline:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1),inset 0 0 0 1.5px var(--rose-light)}
.btn-whatsapp{background:#25D366;color:white;box-shadow:0 4px 16px rgba(37,211,102,0.3)}
.link-box{background:white;padding:14px 20px;border-radius:16px;font-size:14px;color:var(--text-dark);word-break:break-all;box-shadow:0 2px 12px rgba(180,100,80,0.1);max-width:min(360px,calc(100vw - var(--gutter) - var(--gutter-r) - 32px));width:100%}
.share-modal .btn-dash{background:transparent;border:2px solid var(--rose);color:var(--rose);margin-top:8px}
</style>
</head>
<body>
<div class="page-bg"></div>

<header>
  <div class="logo">delicious</div>
  <div class="tagline">Swipe &amp; Pick</div>
</header>

<p class="hero-text">Upload your photos, share with friends,<br>let them <span>pick their faves</span></p>

<div class="upload-area" id="uploadArea">
  <div class="upload-icon">＋</div>
  <div class="upload-main">Tap or drag photos here</div>
  <div class="upload-sub">Up to 30 photos</div>
</div>
<input type="file" id="fileInput" multiple accept="image/*" hidden>

<div class="photos-header" id="photosHeader" style="display:none">
  <span class="photos-count" id="countLabel"></span>
  <span class="photos-clear" id="photosClear">Clear all</span>
</div>
<div class="photos-grid" id="previewGrid"></div>

<div class="form-section" id="formSection" style="display:none">
  <input class="inp" type="text" id="sessionName" placeholder="Session name (e.g. Beach shoot June)">
  <input class="inp" type="text" id="creatorName" placeholder="Your name (optional)">
</div>

<div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
<button class="btn-create" id="btnCreate" style="display:none">Create Session</button>

<div class="share-modal" id="shareModal">
  <div class="s3-logo">delicious</div>
  <div class="share-sub">Share this link with your friends</div>
  <div class="share-row">
    <button class="btn-share btn-outline" id="btnCopy">Copy link</button>
    <button class="btn-share btn-whatsapp" id="btnWa">WhatsApp</button>
  </div>
  <div class="link-box" id="shareLink"></div>
  <button class="btn-share btn-outline btn-dash" id="btnDash">Open dashboard</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');
const formSection = document.getElementById('formSection');
const btnCreate = document.getElementById('btnCreate');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const shareModal = document.getElementById('shareModal');
const countLabel = document.getElementById('countLabel');
const photosHeader = document.getElementById('photosHeader');
const photosClear = document.getElementById('photosClear');

let selectedFiles = [];

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });
photosClear.addEventListener('click', () => { selectedFiles = []; renderPreviews(); });

function addFiles(fileList) {
  const newFiles = Array.from(fileList).filter(f => f.type.startsWith('image/'));
  selectedFiles = [...selectedFiles, ...newFiles].slice(0, 30);
  renderPreviews();
}

function renderPreviews() {
  previewGrid.innerHTML = '';
  selectedFiles.forEach((file, i) => {
    const item = document.createElement('div');
    item.className = 'photo-thumb';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    const rm = document.createElement('button');
    rm.className = 'photo-remove';
    rm.textContent = '\u00d7';
    rm.onclick = () => { selectedFiles.splice(i, 1); renderPreviews(); };
    item.appendChild(img);
    item.appendChild(rm);
    previewGrid.appendChild(item);
  });
  countLabel.textContent = selectedFiles.length > 0 ? `${selectedFiles.length} photo${selectedFiles.length > 1 ? 's' : ''} selected` : '';
  photosHeader.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
  formSection.style.display = selectedFiles.length > 0 ? 'flex' : 'none';
  btnCreate.style.display = selectedFiles.length > 0 ? 'block' : 'none';
}

btnCreate.addEventListener('click', async () => {
  if (selectedFiles.length === 0) return;
  btnCreate.disabled = true;
  btnCreate.textContent = 'Uploading...';
  progressBar.style.display = 'block';

  const sessionId = generateId(8);
  const creatorToken = generateId(16);
  const sessionName = document.getElementById('sessionName').value || 'My Shoot';
  const creatorName = document.getElementById('creatorName').value || '';

  try {
    const { error: sessionErr } = await db.from('sessions').insert({
      id: sessionId, name: sessionName, creator_name: creatorName, creator_token: creatorToken
    });
    if (sessionErr) throw sessionErr;

    const photos = [];
    for (let i = 0; i < selectedFiles.length; i++) {
      const blob = await compressImage(selectedFiles[i]);
      const filename = `${sessionId}/${String(i + 1).padStart(2, '0')}.jpg`;

      const { error: uploadErr } = await db.storage
        .from('photos')
        .upload(filename, blob, { contentType: 'image/jpeg', upsert: true });
      if (uploadErr) throw uploadErr;

      const { data: urlData } = db.storage.from('photos').getPublicUrl(filename);

      photos.push({ session_id: sessionId, photo_index: i, storage_path: filename, url: urlData.publicUrl });

      progressFill.style.width = Math.round(((i + 1) / selectedFiles.length) * 100) + '%';
    }

    const { error: photosErr } = await db.from('session_photos').insert(photos);
    if (photosErr) throw photosErr;

    localStorage.setItem(`delicious-${sessionId}`, creatorToken);
    showShareModal(sessionId);
  } catch (err) {
    console.error('Upload error:', err);
    alert('Upload failed: ' + (err.message || 'Unknown error'));
    btnCreate.disabled = false;
    btnCreate.textContent = 'Create Session';
    progressBar.style.display = 'none';
  }
});

function showShareModal(sessionId) {
  const fullUrl = `${location.origin}/s/${sessionId}`;
  document.getElementById('shareLink').textContent = fullUrl;
  shareModal.classList.add('show');

  document.getElementById('btnCopy').onclick = () => {
    navigator.clipboard.writeText(fullUrl).then(() => {
      document.getElementById('btnCopy').textContent = 'Copied!';
      setTimeout(() => document.getElementById('btnCopy').textContent = 'Copy link', 2000);
    });
  };
  document.getElementById('btnWa').onclick = () => {
    window.open(`https://wa.me/?text=${encodeURIComponent('pick your faves from my shoot \u{1F497} ' + fullUrl)}`, '_blank');
  };
  document.getElementById('btnDash').onclick = () => {
    window.location.href = `/dashboard/${sessionId}`;
  };
}
</script>
</body>
</html>
